<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roar! Happy 23rd Birthday 🦖</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="confettiCanvas" aria-hidden="true"></canvas>

  <section id="gate" class="gate" role="dialog" aria-modal="true" aria-label="Enter password">
    <div class="gate-card">
      <p class="gate-tag">Jurassic Access</p>
      <h2>Enter Secret Password</h2>
      <p class="gate-hint">Only the birthday queen can unlock this mission.</p>
      <label class="sr-only" for="gatePassword">Password</label>
      <input id="gatePassword" class="gate-input" type="password" placeholder="Password" />
      <button id="gateButton" class="btn gate-btn">Enter Dino World</button>
      <p id="gateError" class="gate-error" aria-live="polite"></p>
    </div>
  </section>

  <main id="mainContent" class="page locked" aria-hidden="true">
    <section class="hero">
      <p class="tag">Jurassic Birthday Mission</p>
      <h1>Roarrr! Happy 23rd Birthday</h1>
      <p class="subtitle" id="typeText"></p>

      <div class="actions">
        <button id="songButton" class="btn">Play Birthday Song</button>
        <button id="surpriseButton" class="btn btn-alt">Hatch Dino Surprise</button>
      </div>

      <audio id="birthdaySong" src="assets/audio/happy-birthday.mp3" preload="auto"></audio>
    </section>

    <section class="gallery-wrap">
      <h2>Venezya Dino Memory Cave</h2>
      <p class="hint">Tap a memory fossil</p>
      <div id="gallery" class="gallery"></div>
    </section>
  </main>

  <div id="photoModal" class="modal" role="dialog" aria-modal="true" aria-label="Photo preview">
    <button id="closeModal" class="modal-close" aria-label="Close photo">X</button>
    <img id="modalImage" alt="Memory photo" />
  </div>

  <script src="script.js"></script>
</body>
</html>
